<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shelter Booker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 16px 80px; }
    .header { text-align: center; margin-bottom: 36px; }
    .header h1 { font-size: 1.9rem; font-weight: 700; color: #fff; margin-top: 8px; }
    .header p  { color: #8b949e; margin-top: 6px; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 16px; padding: 32px 36px; width: 100%; max-width: 560px; margin-bottom: 20px; }
    .card-title { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .card-title h2 { font-size: .8rem; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: .1em; margin: 0; }
    .badge { font-size: .7rem; color: #3fb950; background: #0d4429; border: 1px solid #238636; border-radius: 20px; padding: 1px 8px; }
    .field { margin-bottom: 18px; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: .875rem; font-weight: 500; color: #c9d1d9; margin-bottom: 6px; }
    .field label span { color: #6e7681; font-weight: 400; }
    .field input, .field select { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 10px 14px; color: #e6edf3; font-size: .95rem; outline: none; transition: border-color .2s; }
    .field input:focus, .field select:focus { border-color: #388bfd; box-shadow: 0 0 0 3px rgba(56,139,253,.15); }
    .field input::placeholder { color: #484f58; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .note { background: #1c2128; border: 1px solid #30363d; border-left: 3px solid #388bfd; border-radius: 8px; padding: 12px 14px; font-size: .83rem; color: #8b949e; line-height: 1.6; margin-bottom: 18px; }
    .note a { color: #388bfd; text-decoration: none; }
    .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; background: #238636; transition: background .2s; }
    .btn:hover { background: #2ea043; }
    .btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
    #status { display: none; border-radius: 10px; padding: 16px 18px; font-size: .88rem; line-height: 1.7; margin-top: 16px; }
    #status.success { background: #0d4429; border: 1px solid #238636; color: #3fb950; display: block; }
    #status.error   { background: #300d0d; border: 1px solid #f85149; color: #f85149; display: block; }
    #status.info    { background: #1c2128; border: 1px solid #388bfd; color: #79c0ff; display: block; }
    #status a { color: inherit; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.2); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; }
  </style>
</head>
<body>

<div class="header">
  <div style="font-size:48px">&#127957;</div>
  <h1>Shelter Booker</h1>
  <p>Schedule a Naturstyrelsen booking while you sleep.</p>
</div>

<div class="card">
  <div class="card-title">
    <h2>GitHub</h2>
    <span class="badge" id="savedBadge" style="display:none">&#10003; remembered</span>
  </div>
  <div class="note">
    Token saved in <strong>your browser only</strong> &mdash; never sent anywhere except GitHub's API.<br>
    <a href="https://github.com/settings/tokens/new?scopes=repo,workflow&description=ShelterBooker" target="_blank">Create token &mdash; tick <strong>repo</strong> AND <strong>workflow</strong> &rarr;</a>
  </div>
  <div class="row">
    <div class="field">
      <label>GitHub Username</label>
      <input id="ghUser" type="text" placeholder="avioh1211" autocomplete="off" />
    </div>
    <div class="field">
      <label>Personal Access Token</label>
      <input id="ghToken" type="password" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off" />
    </div>
  </div>
</div>

<div class="card">
  <div class="card-title"><h2>Booking</h2></div>
  <div class="field">
    <label>Shelter URL</label>
    <input id="shelterUrl" type="url" placeholder="https://book.naturstyrelsen.dk/sted/strandmoelle-strand-shelter/" />
  </div>
  <div class="row">
    <div class="field">
      <label>Date to book</label>
      <input id="bookDate" type="date" />
    </div>
    <div class="field">
      <label>Fire time <span>(when bookings open)</span></label>
      <input id="fireTime" type="time" value="00:01" />
    </div>
  </div>
  <div class="field">
    <label>Number of people</label>
    <select id="antal">
      <option value="1">1 person</option>
      <option value="2" selected>2 people</option>
      <option value="3">3 people</option>
      <option value="4">4 people</option>
      <option value="5">5 people</option>
      <option value="6">6 people</option>
    </select>
  </div>
</div>

<div class="card">
  <div class="card-title"><h2>Your details</h2></div>
  <div class="row">
    <div class="field">
      <label>First name <span>(Fornavn)</span></label>
      <input id="fornavn" type="text" placeholder="Avi" />
    </div>
    <div class="field">
      <label>Last name <span>(Efternavn)</span></label>
      <input id="efternavn" type="text" placeholder="Ohayon" />
    </div>
  </div>
  <div class="field">
    <label>Email</label>
    <input id="email" type="email" placeholder="you@example.com" />
  </div>
  <div class="field">
    <label>Phone <span>(Telefon)</span></label>
    <input id="telefon" type="tel" placeholder="28575581" />
  </div>
</div>

<div style="max-width:560px;width:100%;">
  <button class="btn" id="scheduleBtn" onclick="scheduleBooking()">
    &#128640; Schedule Booking
  </button>
  <div id="status"></div>
</div>

<script>
var PERSIST = ['ghUser','ghToken','fornavn','efternavn','email','telefon'];

function saveAll() {
  for (var i = 0; i < PERSIST.length; i++) {
    var el = document.getElementById(PERSIST[i]);
    try { if (el) localStorage.setItem('sb_' + PERSIST[i], el.value); } catch(e) {}
  }
  updateBadge();
}

function loadAll() {
  for (var i = 0; i < PERSIST.length; i++) {
    var el = document.getElementById(PERSIST[i]);
    if (!el) continue;
    try { var v = localStorage.getItem('sb_' + PERSIST[i]); if (v !== null) el.value = v; } catch(e) {}
  }
  updateBadge();
}

function updateBadge() {
  try {
    var ok = localStorage.getItem('sb_ghUser') && localStorage.getItem('sb_ghToken');
    var b = document.getElementById('savedBadge');
    if (b) b.style.display = ok ? 'inline-block' : 'none';
  } catch(e) {}
}

window.addEventListener('DOMContentLoaded', function() {
  loadAll();
  for (var i = 0; i < PERSIST.length; i++) {
    (function(id) {
      var el = document.getElementById(id);
      if (el) el.addEventListener('input', saveAll);
    })(PERSIST[i]);
  }
});

function val(id) { var el = document.getElementById(id); return el ? el.value.trim() : ''; }

function setStatus(msg, type) { var el = document.getElementById('status'); el.className = type; el.innerHTML = msg; }

function setLoading(on) {
  var btn = document.getElementById('scheduleBtn');
  btn.disabled = on;
  btn.innerHTML = on ? '<div class="spinner"></div> Saving to GitHub...' : '&#128640; Schedule Booking';
}

function toCronUTC(dateStr, timeStr) {
  // Fire 5 minutes BEFORE target time so script is already running and polling
  var dt = new Date(dateStr + 'T' + timeStr + ':00');
  dt.setMinutes(dt.getMinutes() - 5);
  return dt.getUTCMinutes() + ' ' + dt.getUTCHours() + ' ' + dt.getUTCDate() + ' ' + (dt.getUTCMonth()+1) + ' *';
}

function danishMonth(dateStr) {
  var m = ['Januar','Februar','Marts','April','Maj','Juni','Juli','August','September','Oktober','November','December'];
  return m[new Date(dateStr).getMonth()];
}

function ghHeaders(token) {
  return { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' };
}

async function getDefaultBranch(user, token, repo) {
  var r = await fetch('https://api.github.com/repos/' + user + '/' + repo, { headers: ghHeaders(token) });
  if (!r.ok) { var e = await r.json(); throw new Error('Repo error: ' + e.message); }
  return (await r.json()).default_branch || 'main';
}

async function getFileSha(user, token, repo, filePath, branch) {
  try {
    var r = await fetch('https://api.github.com/repos/' + user + '/' + repo + '/contents/' + filePath + '?ref=' + branch, { headers: ghHeaders(token) });
    if (r.ok) return (await r.json()).sha || null;
  } catch(e) {}
  return null;
}

async function ghPut(user, token, repo, filePath, content, msg, branch) {
  var url = 'https://api.github.com/repos/' + user + '/' + repo + '/contents/' + filePath;
  var enc = btoa(unescape(encodeURIComponent(content)));
  var sha = await getFileSha(user, token, repo, filePath, branch);
  var makeBody = function(s) { var b = { message: msg, content: enc, branch: branch }; if (s) b.sha = s; return JSON.stringify(b); };
  var r = await fetch(url, { method: 'PUT', headers: ghHeaders(token), body: makeBody(sha) });
  if (r.status === 422 || r.status === 409) {
    sha = await getFileSha(user, token, repo, filePath, branch);
    r = await fetch(url, { method: 'PUT', headers: ghHeaders(token), body: makeBody(sha) });
  }
  if (!r.ok) { var e = await r.json(); throw new Error('Failed "' + filePath + '": ' + e.message); }
  return r.json();
}

function buildYaml(cron) {
  var N = '\n';
  return 'name: Book Shelter' + N +
    N + 'on:' + N + '  schedule:' + N + "    - cron: '" + cron + "'" + N + '  workflow_dispatch:' + N +
    N + 'jobs:' + N + '  book:' + N + '    runs-on: ubuntu-latest' + N + '    steps:' + N +
    '      - uses: actions/checkout@v4' + N + N +
    '      - uses: actions/setup-python@v5' + N + '        with:' + N + "          python-version: '3.12'" + N + N +
    '      - name: Install dependencies' + N + '        run: |' + N +
    '          pip install playwright' + N + '          playwright install chromium --with-deps' + N + N +
    '      - name: Run booking agent' + N + '        run: python book_shelter.py' + N + N +
    '      - name: Upload screenshot' + N + '        if: always()' + N +
    '        uses: actions/upload-artifact@v4' + N + '        with:' + N +
    '          name: booking-screenshot' + N + '          path: "*.png"' + N + '          if-no-files-found: ignore' + N;
}

var PYTHON_SCRIPT = "import asyncio, re, json\nfrom datetime import datetime\nfrom playwright.async_api import async_playwright\n\nwith open('config.json') as f:\n    cfg = json.load(f)\n\nDATA         = cfg['data']\nTARGET_URL   = cfg['shelterUrl']\nTARGET_DAY   = cfg['targetDay']\nTARGET_MONTH = cfg['targetMonth']\nFIRE_TIME    = cfg['fireTime']\nMAX_ATTEMPTS = 5\n\nCOOKIE_BTN = \"#CybotCookiebotDialogBodyLevelButtonLevelOptinAllowAll\"\nSUBMIT_SELECTORS = ['a.place-submitbtn', '.place-submitbtn', \"a:has-text('Book nu')\"]\n\ndef log(msg):\n    print(f\"[{datetime.now().strftime('%H:%M:%S')}] {msg}\", flush=True)\n\nasync def accept_cookies(page):\n    try:\n        await page.click(COOKIE_BTN, timeout=3000)\n        log(\"Cookies accepted.\")\n    except Exception:\n        pass\n\nasync def navigate_to_month(page, target_month):\n    log(f\"Navigating to {target_month}...\")\n    next_btn = page.locator(\"i.fa-chevron-right\").first\n    for _ in range(18):\n        header = await page.locator(\".calendar-header\").inner_text()\n        if target_month.lower() in header.lower():\n            log(f\"Arrived at {target_month}!\")\n            return\n        await next_btn.click()\n        await asyncio.sleep(0.4)\n    raise RuntimeError(f\"Could not find month: {target_month}\")\n\nasync def is_day_available(page, day):\n    \"\"\"Returns True when the target day has no td-disabled class \u2014 meaning it just opened.\"\"\"\n    pattern = re.compile(r\"^\\s*\" + re.escape(day) + r\"\\s*$\")\n    day_divs = page.locator(\"div.day\").filter(has_text=pattern)\n    count = await day_divs.count()\n    for i in range(count):\n        div = day_divs.nth(i)\n        td_class = await div.locator(\"xpath=ancestor::td[1]\").get_attribute(\"class\") or \"\"\n        if \"td-disabled\" not in td_class and \"day-overlay-occupied\" not in td_class:\n            return True\n    return False\n\nasync def wait_for_day_to_open(page):\n    \"\"\"Poll the calendar every 2 seconds until the target day loses td-disabled.\"\"\"\n    log(f\"Waiting for day {TARGET_DAY} {TARGET_MONTH} to open for booking...\")\n    log(\"Polling every 2 seconds \u2014 will book the instant it opens!\")\n    polls = 0\n    while True:\n        try:\n            available = await is_day_available(page, TARGET_DAY)\n            if available:\n                log(f\"DAY IS NOW OPEN! Booking immediately!\")\n                return\n            polls += 1\n            if polls % 15 == 0:  # log every 30 seconds\n                log(f\"Still waiting... ({polls * 2}s elapsed)\")\n            # Reload page every 30 seconds to get fresh data\n            if polls % 15 == 0:\n                await page.reload()\n                await asyncio.sleep(1)\n                await accept_cookies(page)\n                await navigate_to_month(page, TARGET_MONTH)\n        except Exception as e:\n            log(f\"Poll error: {e}\")\n        await asyncio.sleep(2)\n\nasync def click_day(page, day):\n    log(f\"Clicking day {day}...\")\n    pattern = re.compile(r\"^\\s*\" + re.escape(day) + r\"\\s*$\")\n    day_divs = page.locator(\"div.day\").filter(has_text=pattern)\n    count = await day_divs.count()\n    if count == 0:\n        raise RuntimeError(f\"Day {day} not found!\")\n    clicked = False\n    for i in range(count):\n        div = day_divs.nth(i)\n        td_class = await div.locator(\"xpath=ancestor::td[1]\").get_attribute(\"class\") or \"\"\n        if \"td-disabled\" in td_class or \"day-overlay-occupied\" in td_class:\n            log(f\"  Cell {i+1} not available, skipping\")\n            continue\n        log(f\"  Cell {i+1} available - clicking!\")\n        await div.click(force=True)\n        clicked = True\n        break\n    if not clicked:\n        raise RuntimeError(f\"Day {day} not available!\")\n    try:\n        await page.wait_for_function(\"() => document.body.innerText.includes('Fra:')\", timeout=6000)\n        log(\"Date selection confirmed!\")\n    except Exception:\n        log(\"Fra: not detected - continuing...\")\n    await asyncio.sleep(0.8)\n\nasync def fill_email_confirm(page, email):\n    await page.evaluate(\n        \"\"\"(v) => {\n            var el = document.querySelector('#Email2');\n            if (!el) return;\n            var setter = Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, 'value').set;\n            setter.call(el, v);\n            ['input','change','blur'].forEach(function(e) {\n                el.dispatchEvent(new Event(e, {bubbles: true}));\n            });\n        }\"\"\",\n        email\n    )\n    log(\"Email2 set via JS\")\n\nasync def fill_fields(page):\n    log(\"Waiting for form...\")\n    await page.wait_for_selector(\"div.place-form-wrapper\", state=\"visible\", timeout=8000)\n    await page.fill(\"#Firstname\",  DATA[\"fornavn\"])\n    await page.fill(\"#Lastname\",   DATA[\"efternavn\"])\n    await page.fill(\"#Email\",      DATA[\"email\"])\n    await fill_email_confirm(page, DATA[\"email\"])\n    await page.fill(\"#Phone\",      DATA[\"telefon\"])\n    await page.fill(\"#PeopleQuantity\", DATA[\"antal\"])\n    await page.check(\"input[name='B_Confirm']\")\n    await page.check(\"input[name='B_ConfirmPrivacy']\")\n    log(\"Form filled!\")\n\nasync def click_submit(page):\n    for sel in SUBMIT_SELECTORS:\n        try:\n            btn = page.locator(sel).first\n            if await btn.is_visible():\n                log(f\"Clicking: {sel}\")\n                await btn.click()\n                return True\n        except Exception:\n            continue\n    return False\n\nasync def book_shelter():\n    async with async_playwright() as p:\n        browser = await p.chromium.launch(headless=True, slow_mo=60)\n        page = await browser.new_page()\n        log(f\"Opening {TARGET_URL}\")\n        await page.goto(TARGET_URL)\n        await accept_cookies(page)\n        await navigate_to_month(page, TARGET_MONTH)\n\n        # Poll until the day opens (handles exact midnight opening automatically)\n        await wait_for_day_to_open(page)\n\n        for attempt in range(1, MAX_ATTEMPTS + 1):\n            try:\n                log(f\"Attempt {attempt}/{MAX_ATTEMPTS}\")\n                if attempt > 1:\n                    await page.reload()\n                    await asyncio.sleep(1)\n                    await accept_cookies(page)\n                    await navigate_to_month(page, TARGET_MONTH)\n                await click_day(page, TARGET_DAY)\n                await fill_fields(page)\n                if not await click_submit(page):\n                    raise RuntimeError(\"Submit button not found!\")\n                await asyncio.sleep(3)\n                body = (await page.content()).lower()\n                done = any(k in body for k in [\"bekraeftelse\",\"tak\",\"booket\",\"succes\",\"kvittering\"])\n                log(f\"CONFIRMED! Check {DATA['email']}\" if done else f\"Submitted - check {DATA['email']}\")\n                ts = datetime.now().strftime('%H%M%S')\n                await page.screenshot(path=f\"booking_{ts}.png\", full_page=True)\n                log(\"ALL DONE!\")\n                break\n            except Exception as e:\n                log(f\"Attempt {attempt} failed: {e}\")\n                try:\n                    await page.screenshot(path=f\"error_{attempt}.png\", full_page=True)\n                except Exception:\n                    pass\n                if attempt < MAX_ATTEMPTS:\n                    await asyncio.sleep(2)\n                else:\n                    log(\"All attempts exhausted.\")\n        await browser.close()\n\nif __name__ == \"__main__\":\n    log(f\"Booking {TARGET_DAY} {TARGET_MONTH} on {TARGET_URL}\")\n    asyncio.run(book_shelter())\n";

async function scheduleBooking() {
  var ghUser    = val('ghUser');
  var ghToken   = val('ghToken');
  var url       = val('shelterUrl');
  var dateStr   = val('bookDate');
  var timeStr   = val('fireTime');
  var fornavn   = val('fornavn');
  var efternavn = val('efternavn');
  var email     = val('email');
  var telefon   = val('telefon');
  var antal     = val('antal');

  if (!ghUser || !ghToken || !url || !dateStr || !fornavn || !email || !telefon) {
    setStatus('Please fill in all fields.', 'error'); return;
  }
  setLoading(true);
  try {
    setStatus('Connecting to GitHub...', 'info');
    var branch = await getDefaultBranch(ghUser, ghToken, 'shelter-booker');
    var day    = String(new Date(dateStr).getDate());
    var month  = danishMonth(dateStr);
    var cron   = toCronUTC(dateStr, timeStr);

    setStatus('Saving config...', 'info');
    var cfg = { shelterUrl: url, targetDay: day, targetMonth: month, fireTime: timeStr + ':00',
                data: { fornavn: fornavn, efternavn: efternavn, email: email, telefon: telefon, antal: antal } };
    await ghPut(ghUser, ghToken, 'shelter-booker', 'config.json', JSON.stringify(cfg, null, 2), 'Update config', branch);

    setStatus('Setting up GitHub Actions...', 'info');
    await ghPut(ghUser, ghToken, 'shelter-booker', '.github/workflows/book.yml', buildYaml(cron), 'Schedule workflow', branch);

    setStatus('Uploading booking script...', 'info');
    await ghPut(ghUser, ghToken, 'shelter-booker', 'book_shelter.py', PYTHON_SCRIPT, 'Update script', branch);

    var d = new Date(dateStr);
    var friendly = d.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
    setStatus(
      '<strong>&#10003; Booking scheduled!</strong><br><br>' +
      'Date: <strong>' + friendly + '</strong> at <strong>' + timeStr + '</strong><br>' +
      'Shelter: <a href="' + url + '" target="_blank">' + url + '</a><br><br>' +
      'Confirmation will go to <strong>' + email + '</strong>.<br><br>' +
      '<a href="https://github.com/' + ghUser + '/shelter-booker/actions" target="_blank">Watch it on GitHub Actions &rarr;</a>',
      'success'
    );
  } catch(err) {
    setStatus('&#10060; ' + err.message, 'error');
  }
  setLoading(false);
}
</script>
</body>
</html>
