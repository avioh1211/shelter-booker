<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shelter Booker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117; color: #e6edf3;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding: 40px 16px 80px;
    }
    .hero { text-align: center; margin-bottom: 48px; }
    .hero .icon { font-size: 56px; margin-bottom: 12px; }
    .hero h1 { font-size: 2.2rem; font-weight: 700; color: #fff; }
    .hero p  { color: #8b949e; margin-top: 8px; font-size: 1.05rem; }
    .card {
      background: #161b22; border: 1px solid #30363d;
      border-radius: 16px; padding: 36px 40px;
      width: 100%; max-width: 580px; margin-bottom: 24px;
    }
    .card h2 {
      font-size: 1rem; font-weight: 600; color: #8b949e;
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 24px;
    }
    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: .875rem; font-weight: 500; color: #c9d1d9; margin-bottom: 6px; }
    .field label span { color: #8b949e; font-weight: 400; }
    .field input, .field select {
      width: 100%; background: #0d1117; border: 1px solid #30363d;
      border-radius: 8px; padding: 10px 14px; color: #e6edf3;
      font-size: .95rem; outline: none; transition: border-color .2s;
    }
    .field input:focus, .field select:focus { border-color: #388bfd; }
    .field input::placeholder { color: #484f58; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .token-note {
      background: #1c2128; border: 1px solid #30363d;
      border-left: 3px solid #388bfd; border-radius: 8px;
      padding: 14px 16px; font-size: .85rem; color: #8b949e;
      line-height: 1.6; margin-bottom: 20px;
    }
    .token-note a { color: #388bfd; text-decoration: none; }
    .token-note a:hover { text-decoration: underline; }
    .btn-primary {
      width: 100%; padding: 14px; background: #238636;
      border: none; border-radius: 10px; color: #fff;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: background .2s, transform .1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary:hover  { background: #2ea043; }
    .btn-primary:active { transform: scale(.98); }
    .btn-primary:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
    #status {
      display: none; border-radius: 10px; padding: 16px 20px;
      font-size: .9rem; line-height: 1.6; margin-top: 16px;
    }
    #status.success { background: #0d4429; border: 1px solid #238636; color: #3fb950; display: block; }
    #status.error   { background: #300d0d; border: 1px solid #f85149; color: #f85149; display: block; }
    #status.info    { background: #1c2128; border: 1px solid #388bfd; color: #79c0ff; display: block; }
    .steps { max-width: 580px; width: 100%; }
    .steps h2 {
      font-size: 1rem; font-weight: 600; color: #8b949e;
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 20px;
    }
    .step { display: flex; gap: 16px; margin-bottom: 20px; }
    .step-num {
      width: 32px; height: 32px; border-radius: 50%;
      background: #238636; color: #fff; font-weight: 700;
      font-size: .85rem; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0;
    }
    .step-body h3 { font-size: .95rem; font-weight: 600; color: #c9d1d9; margin-bottom: 4px; }
    .step-body p  { font-size: .85rem; color: #8b949e; line-height: 1.6; }
    .step-body a  { color: #388bfd; text-decoration: none; }
    .step-body a:hover { text-decoration: underline; }
    .step-body code {
      background: #0d1117; border: 1px solid #30363d;
      border-radius: 4px; padding: 1px 6px;
      font-size: .82rem; color: #79c0ff;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.2);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    hr.divider { border: none; border-top: 1px solid #21262d; margin: 32px 0; }
  </style>
</head>
<body>

<div style="text-align:center;margin-bottom:32px;">
  <div style="font-size:48px;">🏕️</div>
  <h1 style="font-size:1.8rem;font-weight:700;color:#fff;margin-top:8px;">Shelter Booker</h1>
  <p style="color:#8b949e;margin-top:6px;">Schedule a Naturstyrelsen shelter — while you sleep.</p>
</div>

<div class="card">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;"><h2 style="margin:0;font-size:.8rem;font-weight:600;color:#8b949e;text-transform:uppercase;letter-spacing:.1em;">GitHub credentials</h2><span id="credBadge" style="background:#0d4429;border:1px solid #238636;color:#3fb950;font-size:.7rem;font-weight:600;padding:2px 8px;border-radius:20px;opacity:0;transition:opacity .4s;">&#x2713; Saved</span></div>
  <div class="row">
    <div class="field">
      <label>GitHub Username</label>
      <input id="ghUser" type="text" placeholder="avioh1211" oninput="saveCredentials()" />
    </div>
    <div class="field">
      <label>Personal Access Token</label>
      <input id="ghToken" type="password" placeholder="ghp_xxxxxxxxxxxx" oninput="saveCredentials()" />
    </div>
  </div>
  <button onclick="clearCredentials()" style="background:none;border:none;color:#484f58;font-size:.78rem;cursor:pointer;padding:0;margin-top:8px;text-decoration:underline;">Clear saved credentials</button>
</div>

<div class="card">
  <h2>Booking details</h2>
  <div class="field">
    <label>Shelter booking URL</label>
    <input id="shelterUrl" type="url" placeholder="https://book.naturstyrelsen.dk/sted/strandmoelle-strand-shelter/" />
  </div>
  <div class="row">
    <div class="field">
      <label>Date to book</label>
      <input id="bookDate" type="date" />
    </div>
    <div class="field">
      <label>Fire time <span>(when bookings open)</span></label>
      <input id="fireTime" type="time" value="00:01" />
    </div>
  </div>
  <div class="field">
    <label>Number of people</label>
    <select id="antal">
      <option value="1">1 person</option>
      <option value="2" selected>2 people</option>
      <option value="3">3 people</option>
      <option value="4">4 people</option>
      <option value="5">5 people</option>
      <option value="6">6 people</option>
    </select>
  </div>
</div>

<div class="card">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;"><h2 style="margin:0;font-size:.8rem;font-weight:600;color:#8b949e;text-transform:uppercase;letter-spacing:.1em;">Your details</h2><span id="detailsBadge" style="background:#0d4429;border:1px solid #238636;color:#3fb950;font-size:.7rem;font-weight:600;padding:2px 8px;border-radius:20px;opacity:0;transition:opacity .4s;">&#x2713; Saved</span></div>
  <div class="row">
    <div class="field">
      <label>First name <span>(Fornavn)</span></label>
      <input id="fornavn" type="text" placeholder="Avi" oninput="saveDetails()" />
    </div>
    <div class="field">
      <label>Last name <span>(Efternavn)</span></label>
      <input id="efternavn" type="text" placeholder="Ohayon" oninput="saveDetails()" />
    </div>
  </div>
  <div class="field">
    <label>Email</label>
    <input id="email" type="email" placeholder="you@example.com" oninput="saveDetails()" />
  </div>
  <div class="field">
    <label>Phone <span>(Telefon)</span></label>
    <input id="telefon" type="tel" placeholder="28575581" oninput="saveDetails()" />
  </div>
</div>

<div style="max-width:580px;width:100%;">
  <button class="btn-primary" id="scheduleBtn" onclick="scheduleBooking()">
    <span>🚀</span> Schedule Booking
  </button>
  <div id="status"></div>
</div>

<script>
function flashBadge(id){const el=document.getElementById(id);if(!el)return;el.style.opacity="1";clearTimeout(el._t);el._t=setTimeout(()=>el.style.opacity="0",2000);}
function saveCredentials(){localStorage.setItem("sb_u",document.getElementById("ghUser").value);localStorage.setItem("sb_t",document.getElementById("ghToken").value);flashBadge("credBadge");}
function clearCredentials(){["sb_u","sb_t"].forEach(k=>localStorage.removeItem(k));["ghUser","ghToken"].forEach(id=>document.getElementById(id).value="");}
function saveDetails(){["fornavn","efternavn","email","telefon"].forEach(id=>localStorage.setItem("sb_"+id,document.getElementById(id).value));flashBadge("detailsBadge");}
function clearDetails(){["fornavn","efternavn","email","telefon"].forEach(id=>{localStorage.removeItem("sb_"+id);document.getElementById(id).value="";});}
(function(){const m={ghUser:"sb_u",ghToken:"sb_t",fornavn:"sb_fornavn",efternavn:"sb_efternavn",email:"sb_email",telefon:"sb_telefon"};for(const[id,k]of Object.entries(m)){const v=localStorage.getItem(k);if(v)document.getElementById(id).value=v;}})();
function val(id) { return document.getElementById(id).value.trim(); }

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.className = type;
  el.innerHTML = msg;
}

function setLoading(loading) {
  const btn = document.getElementById('scheduleBtn');
  btn.disabled = loading;
  btn.innerHTML = loading
    ? '<div class="spinner"></div> Saving to GitHub...'
    : '<span>🚀</span> Schedule Booking';
}

function toCronUTC(dateStr, timeStr) {
  const dt = new Date(dateStr + 'T' + timeStr + ':00');
  return `${dt.getUTCMinutes()} ${dt.getUTCHours()} ${dt.getUTCDate()} ${dt.getUTCMonth()+1} *`;
}

function danishMonth(dateStr) {
  const months = ['Januar','Februar','Marts','April','Maj','Juni',
                  'Juli','August','September','Oktober','November','December'];
  return months[new Date(dateStr).getMonth()];
}

// Step 1: detect default branch (main or master)
async function getDefaultBranch(user, token, repo) {
  const res = await fetch(`https://api.github.com/repos/${user}/${repo}`, {
    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
  });
  if (!res.ok) {
    const e = await res.json();
    throw new Error(`Cannot access repo "${user}/${repo}": ${e.message}. Check the repo exists and your token has repo scope.`);
  }
  const data = await res.json();
  return data.default_branch || 'main';
}

// Create or update a file — branch is always passed explicitly
// Fetch current SHA for a file (needed for updates)
async function getSha(url, token, branch) {
  try {
    const r = await fetch(`${url}?ref=${branch}`, {
      headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
    });
    if (r.ok) return (await r.json()).sha || null;
  } catch(e) {}
  return null;
}

// Create or update a file — retries on SHA mismatch
async function githubPut(user, token, repo, path, content, message, branch) {
  const url = `https://api.github.com/repos/${user}/${repo}/contents/${path}`;
  const encoded = btoa(unescape(encodeURIComponent(content)));

  const doWrite = async (sha) => {
    const body = { message, content: encoded, branch };
    if (sha) body.sha = sha;
    return fetch(url, {
      method: 'PUT',
      headers: {
        Authorization: `token ${token}`,
        Accept: 'application/vnd.github.v3+json',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(body)
    });
  };

  // Always get a fresh SHA right before writing
  let sha = await getSha(url, token, branch);
  let res = await doWrite(sha);

  // 422 = SHA mismatch — fetch again and retry once
  if (res.status === 422) {
    sha = await getSha(url, token, branch);
    res = await doWrite(sha);
  }

  if (!res.ok) {
    const err = await res.json();
    throw new Error(`Failed writing "${path}": ${err.message}`);
  }
  return res.json();
}

  return res.json();
}

async function scheduleBooking() {
  const ghUser    = val('ghUser');
  const ghToken   = val('ghToken');
  const url       = val('shelterUrl');
  const dateStr   = val('bookDate');
  const timeStr   = val('fireTime');
  const fornavn   = val('fornavn');
  const efternavn = val('efternavn');
  const email     = val('email');
  const telefon   = val('telefon');
  const antal     = val('antal');

  if (!ghUser || !ghToken || !url || !dateStr || !fornavn || !email || !telefon) {
    setStatus('Please fill in all fields.', 'error');
    return;
  }

  setLoading(true);

  try {
    // Detect branch first — this also validates the token and repo exist
    setStatus('Connecting to GitHub...', 'info');
    const branch = await getDefaultBranch(ghUser, ghToken, 'shelter-booker');
    setStatus(`Connected! Repo uses branch: <strong>${branch}</strong>. Saving files...`, 'info');

    const day   = String(new Date(dateStr).getDate());
    const month = danishMonth(dateStr);
    const cron  = toCronUTC(dateStr, timeStr);

    // ── 1. config.json ────────────────────────────────────────────────────────
    const config = {
      shelterUrl: url, targetDay: day, targetMonth: month,
      fireTime: timeStr + ':00',
      data: { fornavn, efternavn, email, telefon, antal }
    };
    setStatus('Saving config.json...', 'info');
    await githubPut(ghUser, ghToken, 'shelter-booker', 'config.json',
      JSON.stringify(config, null, 2), 'Update booking config', branch);

    // ── 2. GitHub Actions workflow ────────────────────────────────────────────
    const yaml =
`name: Book Shelter

on:
  schedule:
    - cron: '${cron}'
  workflow_dispatch:

jobs:
  book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Run booking agent
        run: python book_shelter.py

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: booking-screenshot
          path: "*.png"
          if-no-files-found: ignore
`;
    // GitHub API can't write to subfolders that don't exist yet.
    // Create the folder structure first with placeholder files, then write the real file.
    setStatus('Creating .github/workflows/ folder structure...', 'info');
    await githubPut(ghUser, ghToken, 'shelter-booker',
      '.github/.gitkeep', '', 'Create .github folder', branch);
    await githubPut(ghUser, ghToken, 'shelter-booker',
      '.github/workflows/.gitkeep', '', 'Create workflows folder', branch);

    setStatus('Setting up GitHub Actions workflow...', 'info');
    await githubPut(ghUser, ghToken, 'shelter-booker',
      '.github/workflows/book.yml', yaml, 'Schedule booking workflow', branch);

    // ── 3. book_shelter.py ────────────────────────────────────────────────────
    const py =
`import asyncio, re, os, sys, json
from datetime import datetime
from playwright.async_api import async_playwright

with open('config.json') as f:
    cfg = json.load(f)

DATA         = cfg['data']
TARGET_URL   = cfg['shelterUrl']
TARGET_DAY   = cfg['targetDay']
TARGET_MONTH = cfg['targetMonth']
MAX_ATTEMPTS = 5

COOKIE_BTN = "#CybotCookiebotDialogBodyLevelButtonLevelOptinAllowAll"
SUBMIT_SELECTORS = [
    "a.place-submitbtn",
    ".place-submitbtn",
    "a:has-text('Book nu')",
]

def log(msg):
    print(f"[{datetime.now().strftime('%H:%M:%S')}] {msg}", flush=True)

async def accept_cookies(page):
    try:
        await page.click(COOKIE_BTN, timeout=3000)
        log("Cookies accepted.")
    except Exception:
        pass

async def navigate_to_month(page, target_month):
    log(f"Navigating to {target_month}...")
    next_btn = page.locator("i.fa-chevron-right").first
    for _ in range(18):
        header = await page.locator(".calendar-header").inner_text()
        if target_month.lower() in header.lower():
            log(f"Arrived at {target_month}!")
            return
        await next_btn.click()
        await asyncio.sleep(0.4)
    raise RuntimeError(f"Could not find month: {target_month}")

async def click_day(page, day):
    log(f"Looking for day {day}...")
    day_divs = page.locator("div.day").filter(
        has_text=re.compile(rf"^\\s*{re.escape(day)}\\s*$")
    )
    count = await day_divs.count()
    if count == 0:
        raise RuntimeError(f"Day {day} not found in calendar!")
    clicked = False
    for i in range(count):
        div = day_divs.nth(i)
        td_class = await div.locator("xpath=ancestor::td[1]").get_attribute("class") or ""
        if "day-overlay-occupied" in td_class or "td-disabled" in td_class:
            log(f"  Day {day} cell {i+1} is booked, skipping")
            continue
        log(f"  Day {day} cell {i+1} is available - clicking!")
        await div.click(force=True)
        clicked = True
        break
    if not clicked:
        raise RuntimeError(f"Day {day} is fully booked!")
    try:
        await page.wait_for_function("() => document.body.innerText.includes('Fra:')", timeout=6000)
        log("Date selection confirmed!")
    except Exception:
        log("Fra: not detected - continuing...")
    await asyncio.sleep(0.8)

async def fill_email_confirm(page, email):
    field = page.locator("#EmailConfirm")
    await field.click()
    await field.press("Control+a")
    await field.press("Delete")
    await page.keyboard.type(email, delay=40)
    el = await page.query_selector("#EmailConfirm")
    await page.evaluate(
        "el => { el.dispatchEvent(new Event('input',{bubbles:true})); el.dispatchEvent(new Event('change',{bubbles:true})); el.dispatchEvent(new Event('blur',{bubbles:true})); }",
        el
    )

async def fill_fields(page):
    log("Waiting for form...")
    await page.wait_for_selector("div.place-form-wrapper", state="visible", timeout=8000)
    await page.fill("#Firstname",    DATA["fornavn"])
    await page.fill("#Lastname",     DATA["efternavn"])
    await page.fill("#Email",        DATA["email"])
    await fill_email_confirm(page,   DATA["email"])
    await page.fill("#Phone",        DATA["telefon"])
    await page.select_option("select[name='B_Count']", value=DATA["antal"])
    await page.check("input[name='B_Confirm']")
    log("Form filled!")

async def click_submit(page):
    for sel in SUBMIT_SELECTORS:
        try:
            btn = page.locator(sel).first
            if await btn.is_visible():
                log(f"Clicking submit: {sel}")
                await btn.click()
                return True
        except Exception:
            continue
    return False

async def check_confirmation(page):
    keywords = ["bekraeftelse", "confirmation", "tak", "booket", "succes", "kvittering"]
    content = (await page.content()).lower()
    if any(k in content for k in keywords):
        log(f"CONFIRMED! Check {DATA['email']}")
    else:
        log(f"WARNING: No confirmation detected. Check {DATA['email']}")

async def save_screenshot(page, label):
    try:
        path = f"booking_{label}_{datetime.now().strftime('%H%M%S')}.png"
        await page.screenshot(path=path, full_page=True)
        log(f"Screenshot: {path}")
    except Exception:
        pass

async def book_shelter():
    async with async_playwright() as p:
        browser = await p.chromium.launch(headless=True, slow_mo=60)
        page = await browser.new_page()
        log(f"Opening {TARGET_URL}")
        await page.goto(TARGET_URL)
        await accept_cookies(page)
        for attempt in range(1, MAX_ATTEMPTS + 1):
            try:
                log(f"Attempt {attempt}/{MAX_ATTEMPTS}")
                await page.reload()
                await asyncio.sleep(1.5)
                await accept_cookies(page)
                await navigate_to_month(page, TARGET_MONTH)
                await click_day(page, TARGET_DAY)
                await fill_fields(page)
                if not await click_submit(page):
                    raise RuntimeError("Submit button not found!")
                await asyncio.sleep(3)
                await check_confirmation(page)
                await save_screenshot(page, "success")
                log("ALL DONE!")
                break
            except Exception as e:
                log(f"Attempt {attempt} failed: {e}")
                await save_screenshot(page, f"error_{attempt}")
                if attempt < MAX_ATTEMPTS:
                    await asyncio.sleep(2)
                else:
                    log("All attempts exhausted.")
        await browser.close()

if __name__ == "__main__":
    log(f"Booking day {TARGET_DAY} {TARGET_MONTH} on {TARGET_URL}")
    asyncio.run(book_shelter())
`;
    setStatus('Uploading booking script...', 'info');
    await githubPut(ghUser, ghToken, 'shelter-booker',
      'book_shelter.py', py, 'Update booking script', branch);

    // ── Success ──────────────────────────────────────────────────────────────
    const d = new Date(dateStr);
    const friendly = d.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
    setStatus(`
      <strong>All done! Booking scheduled.</strong><br><br>
      Date: <strong>${friendly}</strong><br>
      GitHub Actions fires at: <strong>${timeStr}</strong> your local time<br>
      Cron (UTC): <code>${cron}</code><br>
      Shelter: <a href="${url}" target="_blank" style="color:#3fb950">${url}</a><br><br>
      GitHub will run the script and send a confirmation to <strong>${email}</strong>.<br><br>
      <a href="https://github.com/${ghUser}/shelter-booker/actions" target="_blank" style="color:#3fb950">
        Watch it run on GitHub Actions →
      </a>
    `, 'success');

  } catch(err) {
    setStatus(`Error: ${err.message}`, 'error');
  }

  setLoading(false);
}
</script>
</body>
</html>
